<div class="login-container">
  <div class="login-card animate-fade-in">
    <div class="login-header">
      <div class="logo-circle">
        <lucide-icon [img]="LockIcon" class="logo-icon"></lucide-icon>
      </div>
      <h1>Gestión de Cursos</h1>
      <p>Inicie sesión para continuar</p>
    </div>
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-with-icon">
          <lucide-icon [img]="MailIcon" class="input-icon"></lucide-icon>
          <input type="email" id="email" formControlName="Email" class="form-control" placeholder="admin@idat.edu.pe" required>
        </div>
        @if (loginForm.get('Email')?.touched && loginForm.get('Email')?.invalid) {
          <small class="error-text">Email válido es requerido</small>
        }
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-with-icon">
          <lucide-icon [img]="LockIcon" class="input-icon"></lucide-icon>
          <input type="password" id="password" formControlName="Clave" class="form-control" placeholder="••••••••" required>
        </div>
        @if (loginForm.get('Clave')?.touched && loginForm.get('Clave')?.invalid) {
          <small class="error-text">Contraseña es requerida</small>
        }
      </div>
      <button type="submit" class="btn-primary btn-block" [disabled]="loading || loginForm.invalid">
        {{ loading ? 'Autenticando...' : 'Iniciar Sesión' }}
      </button>
      @if (error) {
        <div class="error-msg animate-fade-in">{{ error }}</div>
      }
    </form>
  </div>
</div>
